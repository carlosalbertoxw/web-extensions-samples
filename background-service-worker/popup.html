<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <style>
    body {
      width: 300px;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .stat {
      margin: 10px 0;
    }

    .number {
      font-size: 2em;
      font-weight: bold;
      color: #1a73e8;
    }
  </style>
</head>

<body>
  <h1>Background service worker</h1>
  <p>The worker counts tabs in the background. Open a few new tabs and reopen
    this popup — the number keeps growing.</p>
  <div class="stat">
    <div class="number" id="tabsOpened">0</div>
    tabs opened since install
  </div>
  <div class="stat">Installed at: <span id="installedAt">-</span></div>
  <script src="popup.js"></script>
</body>

</html>
