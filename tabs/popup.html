<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <style>
    body {
      width: 320px;
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      font-size: 1.2em;
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      max-height: 220px;
      overflow-y: auto;
    }

    li {
      padding: 6px 8px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    li:hover {
      background-color: #e8f0fe;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h1>Open tabs</h1>
  <ul id="tabList"></ul>
  <button id="openTab">Open a new tab (chrome.dev)</button>
  <script src="popup.js"></script>
</body>

</html>
