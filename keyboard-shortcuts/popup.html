<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <style>
    body {
      width: 300px;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    kbd {
      background-color: #eee;
      border: 1px solid #ccc;
      border-radius: 3px;
      padding: 2px 6px;
      font-family: monospace;
    }
  </style>
</head>

<body>
  <h1>Keyboard shortcuts</h1>
  <p>Press <kbd>Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>Y</kbd> anywhere to show a
    notification.</p>
  <p>You can change the shortcut at <code>chrome://extensions/shortcuts</code>.</p>
</body>

</html>
